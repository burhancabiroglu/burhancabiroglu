<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D Microservice City Preview</title>
  <desc id="desc">A cinematic preview of a 3D backend and AI career navigator with Spring Boot services, RabbitMQ, PostgreSQL, observability, and AI worker towers.</desc>
  <style>
    .text { fill: #edf6ff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #9fb1c4; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { fill: #b7c4d4; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .neonBlue { stroke: #58a6ff; filter: url(#glowBlue); }
    .neonGreen { stroke: #36d399; filter: url(#glowGreen); }
    .neonViolet { stroke: #a78bfa; filter: url(#glowViolet); }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .float { animation: float 4s ease-in-out infinite; }
    .dash { stroke-dasharray: 10 16; animation: dash 1.5s linear infinite; }
    .scan { animation: scan 3.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .68; transform: scale(1); } 50% { opacity: 1; transform: scale(1.035); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes dash { to { stroke-dashoffset: -52; } }
    @keyframes scan { 0%,100% { transform: translateX(0); opacity: .12; } 50% { transform: translateX(420px); opacity: .72; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B12"/>
      <stop offset=".48" stop-color="#0B1420"/>
      <stop offset="1" stop-color="#07110F"/>
    </linearGradient>
    <linearGradient id="road" x1="163" y1="354" x2="1013" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#162235"/>
      <stop offset=".5" stop-color="#1E2C3E"/>
      <stop offset="1" stop-color="#10251E"/>
    </linearGradient>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowViolet" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="518" rx="25" stroke="#273448"/>
  <circle cx="207" cy="107" r="210" fill="#58A6FF" opacity=".12"/>
  <circle cx="1002" cy="146" r="220" fill="#36D399" opacity=".10"/>
  <circle cx="635" cy="490" r="250" fill="#A78BFA" opacity=".10"/>

  <text x="58" y="72" class="text" font-size="34" font-weight="850">3D Microservice City</text>
  <text x="58" y="104" class="muted" font-size="16">Explore Burhan's Spring Boot microservices, distributed systems, and AI engineering path.</text>

  <polygon points="162,355 612,238 1040,353 591,480" fill="url(#road)" stroke="#2D3B50"/>
  <path d="M214 357 C389 302 493 291 622 330 C735 365 840 374 996 350" class="dash neonBlue" stroke-width="4" fill="none"/>
  <path d="M271 407 C450 353 571 359 670 388 C766 416 860 415 948 390" class="dash neonGreen" stroke-width="4" fill="none"/>

  <g class="float">
    <polygon points="181,266 254,246 254,356 181,377" fill="#132238" stroke="#58A6FF"/>
    <polygon points="254,246 318,270 318,380 254,356" fill="#101A2A" stroke="#2D3B50"/>
    <polygon points="181,266 244,290 318,270 254,246" fill="#1A2D49" stroke="#58A6FF"/>
    <text x="214" y="232" class="mono" font-size="14">API Gateway</text>
  </g>

  <g class="float" style="animation-delay:.3s">
    <polygon points="365,205 450,182 450,350 365,373" fill="#13271F" stroke="#36D399"/>
    <polygon points="450,182 523,213 523,382 450,350" fill="#101C18" stroke="#2D3B50"/>
    <polygon points="365,205 438,236 523,213 450,182" fill="#1D3A2D" stroke="#36D399"/>
    <text x="372" y="170" class="mono" font-size="14">Spring Boot Services</text>
  </g>

  <g class="float" style="animation-delay:.55s">
    <polygon points="604,163 682,143 682,354 604,374" fill="#241C39" stroke="#A78BFA"/>
    <polygon points="682,143 756,174 756,386 682,354" fill="#171326" stroke="#2D3B50"/>
    <polygon points="604,163 678,195 756,174 682,143" fill="#30264B" stroke="#A78BFA"/>
    <text x="617" y="130" class="mono" font-size="14">AI Worker</text>
  </g>

  <g class="float" style="animation-delay:.85s">
    <polygon points="824,220 895,201 895,350 824,370" fill="#382718" stroke="#FFD166"/>
    <polygon points="895,201 958,228 958,378 895,350" fill="#221A11" stroke="#2D3B50"/>
    <polygon points="824,220 887,247 958,228 895,201" fill="#4A341F" stroke="#FFD166"/>
    <text x="841" y="188" class="mono" font-size="14">RabbitMQ</text>
  </g>

  <g>
    <rect x="610" y="397" width="64" height="24" rx="7" fill="#101827" stroke="#58A6FF"/>
    <rect x="661" y="390" width="52" height="31" rx="7" fill="#13271F" stroke="#36D399"/>
    <circle cx="628" cy="426" r="8" fill="#0B111B" stroke="#58A6FF"/>
    <circle cx="696" cy="426" r="8" fill="#0B111B" stroke="#36D399"/>
    <text x="608" y="382" class="mono" font-size="13">event delivery truck</text>
  </g>

  <g class="pulse">
    <rect x="814" y="56" width="308" height="128" rx="18" fill="#101827" stroke="#303D52"/>
    <circle cx="850" cy="98" r="21" fill="#172336" stroke="#58A6FF"/>
    <rect x="872" y="88" width="18" height="34" rx="8" fill="#36D399"/>
    <text x="902" y="93" class="text" font-size="17" font-weight="800">AI Interviewer</text>
    <text x="902" y="119" class="muted" font-size="13">asks about backend depth, projects,</text>
    <text x="902" y="139" class="muted" font-size="13">Spring Boot, and AI engineering.</text>
  </g>

  <rect x="58" y="398" width="386" height="58" rx="14" fill="#101827" stroke="#303D52"/>
  <rect x="73" y="415" width="88" height="24" rx="12" fill="#122D22" stroke="#36D399"/>
  <text x="86" y="432" class="mono" font-size="12">Explore</text>
  <text x="178" y="433" class="muted" font-size="14">Interactive 3D profile built with Three.js</text>

  <rect x="354" y="122" width="440" height="260" fill="#58A6FF" opacity=".08" class="scan"/>
</svg>
