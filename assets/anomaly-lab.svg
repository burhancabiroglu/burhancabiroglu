<svg width="1100" height="430" viewBox="0 0 1100 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Anomaly Detection Lab</title>
  <desc id="desc">Animated backend and AI architecture showing metrics, anomaly detection, neural network signals, event bus, microservices, and recovery automation.</desc>

  <style>
    .bg { fill: #0d1117; }
    .panel { fill: #111827; stroke: #30363d; stroke-width: 1.2; }
    .panel2 { fill: #0f1722; stroke: #30363d; stroke-width: 1.2; }
    .text { fill: #e6edf3; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #8b949e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { fill: #9da7b3; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .green { fill: #36d399; }
    .blue { fill: #58a6ff; }
    .yellow { fill: #ffd166; }
    .red { fill: #ff6b6b; }
    .violet { fill: #a78bfa; }
    .line { stroke: #30363d; stroke-width: 2; }
    .flow { stroke: #58a6ff; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 8 12; animation: dash 1.2s linear infinite; }
    .flow2 { stroke: #36d399; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 7 10; animation: dash 1.4s linear infinite; }
    .warn { stroke: #ffd166; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 5 9; animation: dash 1.05s linear infinite; }
    .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
    .pulseFast { animation: pulse 1.25s ease-in-out infinite; transform-origin: center; }
    .blink { animation: blink 1.4s ease-in-out infinite; }
    .scan { animation: scan 3.2s ease-in-out infinite; }
    .bar1 { animation: bar1 3s ease-in-out infinite; transform-origin: bottom; }
    .bar2 { animation: bar2 3.2s ease-in-out infinite; transform-origin: bottom; }
    .bar3 { animation: bar3 2.6s ease-in-out infinite; transform-origin: bottom; }
    .bar4 { animation: bar4 2.9s ease-in-out infinite; transform-origin: bottom; }
    @keyframes dash { to { stroke-dashoffset: -40; } }
    @keyframes pulse { 0%, 100% { opacity: .72; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes blink { 0%, 52%, 100% { opacity: .28; } 58%, 78% { opacity: 1; } }
    @keyframes scan { 0%, 100% { transform: translateX(0); opacity: .15; } 50% { transform: translateX(178px); opacity: .7; } }
    @keyframes bar1 { 0%, 100% { transform: scaleY(.42); } 45% { transform: scaleY(.82); } }
    @keyframes bar2 { 0%, 100% { transform: scaleY(.58); } 55% { transform: scaleY(.94); } }
    @keyframes bar3 { 0%, 100% { transform: scaleY(.35); } 50% { transform: scaleY(1); } }
    @keyframes bar4 { 0%, 100% { transform: scaleY(.7); } 45% { transform: scaleY(.48); } }
  </style>

  <rect class="bg" width="1100" height="430" rx="18"/>
  <rect x="1" y="1" width="1098" height="428" rx="17" stroke="#30363d"/>

  <text x="42" y="48" class="text" font-size="28" font-weight="800">AI Anomaly Detection Lab</text>
  <text x="42" y="78" class="muted" font-size="15">Deep learning signals meet production backend systems: metrics, events, inference, and automated recovery.</text>

  <rect x="40" y="112" width="220" height="248" rx="14" class="panel"/>
  <text x="62" y="145" class="text" font-size="18" font-weight="800">Live Metrics</text>
  <text x="62" y="170" class="muted" font-size="13">latency / throughput / errors</text>

  <rect x="70" y="305" width="22" height="35" rx="4" class="blue bar1"/>
  <rect x="108" y="270" width="22" height="70" rx="4" class="green bar2"/>
  <rect x="146" y="244" width="22" height="96" rx="4" class="yellow bar3"/>
  <rect x="184" y="288" width="22" height="52" rx="4" class="violet bar4"/>
  <polyline points="62,236 95,222 128,230 161,182 194,204 228,156" stroke="#ff6b6b" stroke-width="3" fill="none"/>
  <circle cx="161" cy="182" r="6" class="red pulseFast"/>
  <text x="62" y="216" class="mono" font-size="13">p95 latency spike</text>

  <path d="M260 236 C305 236 306 216 350 216" class="warn"/>
  <path d="M260 272 C305 272 306 302 350 302" class="flow2"/>

  <rect x="350" y="112" width="250" height="248" rx="14" class="panel2"/>
  <text x="374" y="145" class="text" font-size="18" font-weight="800">Model Inference</text>
  <text x="374" y="170" class="muted" font-size="13">anomaly score + confidence</text>

  <circle cx="410" cy="225" r="13" class="blue pulse"/>
  <circle cx="410" cy="285" r="13" class="blue pulse"/>
  <circle cx="475" cy="200" r="13" class="violet pulse"/>
  <circle cx="475" cy="255" r="13" class="violet pulse"/>
  <circle cx="475" cy="310" r="13" class="violet pulse"/>
  <circle cx="540" cy="255" r="15" class="green pulse"/>

  <line x1="423" y1="225" x2="462" y2="200" class="line"/>
  <line x1="423" y1="225" x2="462" y2="255" class="line"/>
  <line x1="423" y1="225" x2="462" y2="310" class="line"/>
  <line x1="423" y1="285" x2="462" y2="200" class="line"/>
  <line x1="423" y1="285" x2="462" y2="255" class="line"/>
  <line x1="423" y1="285" x2="462" y2="310" class="line"/>
  <line x1="488" y1="200" x2="525" y2="255" class="line"/>
  <line x1="488" y1="255" x2="525" y2="255" class="line"/>
  <line x1="488" y1="310" x2="525" y2="255" class="line"/>

  <rect x="383" y="327" width="180" height="12" rx="6" fill="#1f2937"/>
  <rect x="383" y="327" width="136" height="12" rx="6" fill="#36d399" class="pulse"/>
  <text x="383" y="318" class="mono" font-size="13">confidence 0.92</text>
  <rect x="371" y="184" width="206" height="140" rx="8" stroke="#30363d" fill="none"/>
  <rect x="378" y="190" width="18" height="128" rx="4" fill="#58a6ff" opacity=".14" class="scan"/>

  <path d="M600 236 C648 236 648 190 698 190" class="flow"/>
  <path d="M600 270 C648 270 648 322 698 322" class="flow2"/>

  <rect x="698" y="104" width="362" height="264" rx="14" class="panel"/>
  <text x="722" y="137" class="text" font-size="18" font-weight="800">Backend Response Graph</text>
  <text x="722" y="162" class="muted" font-size="13">microservices, event bus, retries, and recovery automation</text>

  <g>
    <rect x="735" y="196" width="118" height="46" rx="10" fill="#111827" stroke="#58a6ff"/>
    <text x="794" y="224" class="text" font-size="13" font-weight="800" text-anchor="middle">API Gateway</text>

    <rect x="903" y="196" width="118" height="46" rx="10" fill="#111827" stroke="#36d399"/>
    <text x="962" y="224" class="text" font-size="13" font-weight="800" text-anchor="middle">Order Service</text>

    <rect x="735" y="292" width="118" height="46" rx="10" fill="#111827" stroke="#ffd166"/>
    <text x="794" y="320" class="text" font-size="13" font-weight="800" text-anchor="middle">RabbitMQ</text>

    <rect x="903" y="292" width="118" height="46" rx="10" fill="#111827" stroke="#a78bfa"/>
    <text x="962" y="320" class="text" font-size="13" font-weight="800" text-anchor="middle">AI Worker</text>

    <path d="M853 219 L903 219" class="flow"/>
    <path d="M962 242 L962 292" class="flow2"/>
    <path d="M903 315 L853 315" class="flow2"/>
    <path d="M794 292 L794 242" class="warn"/>
  </g>

  <g class="blink">
    <rect x="724" y="374" width="324" height="28" rx="8" fill="#1f2937" stroke="#30363d"/>
    <circle cx="742" cy="388" r="5" class="green"/>
    <text x="758" y="393" class="mono" font-size="12">auto-remediation: scale AI worker, open incident, reduce queue pressure</text>
  </g>

  <g>
    <circle cx="1024" cy="62" r="7" class="green pulse"/>
    <text x="958" y="67" class="mono" font-size="13">system recovered</text>
  </g>
</svg>
